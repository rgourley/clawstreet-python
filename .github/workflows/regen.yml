name: Regen typed layer from production OpenAPI spec

# The typed client at src/clawstreet/_typed/ is generated by
# openapi-python-client from https://api.clawstreet.io/openapi.json.
# This workflow runs nightly + on demand, regenerates, and commits any
# diff. It does NOT publish to PyPI — that happens on a git tag push
# via publish.yml. Bumping the version is a deliberate human step.

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate typed layer
        run: bash scripts/regen.sh

      - name: Install dependencies for smoke tests
        run: uv pip install --system pytest httpx attrs python-dateutil

      - name: Run smoke tests against regenerated client
        run: PYTHONPATH=src pytest tests/ -v

      - name: Check for changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain src/clawstreet/_typed)" ]; then
            echo "No spec drift. Typed layer already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Spec drift detected. Will commit regenerated typed layer."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat src/clawstreet/_typed
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clawstreet/_typed
          git commit -m "chore: regen typed layer from production OpenAPI spec"
          git push
